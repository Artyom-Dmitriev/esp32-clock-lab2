# =====================================================================
# wokwi.toml — конфиг для VS Code расширения "Wokwi for VS Code"
# Позволяет запустить симуляцию ESP32 прямо в редакторе.
#
# Как пользоваться:
#   1. Установи расширение "Wokwi Simulator" в VS Code (нужен интернет ТОЛЬКО при установке).
#   2. Собери проект: PlatformIO -> Build (или клавиша Ctrl+Alt+B).
#   3. Нажми F1 -> "Wokwi: Start Simulator".
#   4. Откроется виртуальная ESP32 — в Serial-мониторе появится IP точки доступа.
#   5. В реальный браузер зайти не получится (это симуляция),
#      но Wokwi умеет показывать виртуальный браузер с веб-страницей —
#      нажми на иконку "Browser" в панели симулятора.
#
# Пути ниже указывают на скомпилированную PlatformIO прошивку.
# =====================================================================

[wokwi]
version = 1
firmware = '.pio/build/nodemcu-32s/firmware.bin'
elf = '.pio/build/nodemcu-32s/firmware.elf'
