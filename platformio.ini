; ===============================================================
; PlatformIO Project Configuration File
; Лабораторная работа №2, вариант 5: "Аналоговые часы с веб-интерфейсом"
; Плата: NodeMCU-32S (ESP32-WROOM-32)
; ===============================================================

[env:nodemcu-32s]
platform = espressif32          ; платформа Espressif (ESP32) для PlatformIO
board = nodemcu-32s              ; конкретная модель платы — NodeMCU-32S
framework = arduino              ; используем Arduino-совместимый фреймворк

; --- Скорость порта USB-UART ---
; Скорость прошивки повышена до 921600 — заливка занимает ~5 сек.
; Если будут ошибки прошивки (например, при плохом кабеле) — снизь до 460800 или 115200.
upload_speed = 921600

; --- Скорость монитора порта ---
; Должна совпадать со значением Serial.begin() в коде (115200 — стандарт).
monitor_speed = 115200

; --- Фильтры монитора порта ---
; esp32_exception_decoder автоматически расшифровывает stack trace при крашах ESP32 —
; очень помогает при отладке (ищет .elf файл в .pio/build).
monitor_filters = esp32_exception_decoder, default

; --- Зависимости (библиотеки) ---
; WiFi.h и WebServer.h входят в ESP32 Arduino Core — отдельно ставить НЕ надо.
; Это важно: на вузовском компьютере с плохим интернетом ничего скачивать не нужно,
; всё уже будет в .pio/ после первой сборки дома.
lib_deps =
    ; (пусто — стандартных библиотек ESP32 достаточно)

; --- Флаги компилятора ---
build_flags =
    -D CORE_DEBUG_LEVEL=0        ; отключаем отладочные логи ядра ESP32 (чище Serial)
